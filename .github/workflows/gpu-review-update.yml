name: GPU Review Update

on:
  schedule:
    # Weekly at 04:30 UTC. Review sources change more slowly than prices, and
    # this keeps Amazon/Reddit scraping polite.
    - cron: '30 4 * * 0'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Maximum number of GPU documents to update'
        required: false
        default: '50'

concurrency:
  group: gpu-review-update
  cancel-in-progress: false

jobs:
  update-gpu-reviews:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        timeout-minutes: 25
        run: npm ci

      - name: Install system libraries headless Chrome needs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk-bridge2.0-0 libgbm1 libxkbcommon0 libgtk-3-0 libasound2

      - name: Run GPU review scraper
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          DB_NAME: pcbuilder
          LIMIT: ${{ github.event.inputs.limit || '50' }}
        run: |
          if [ -z "${MONGODB_URI}" ]; then
            echo "::error::MONGODB_URI secret is empty. Add it under Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          node scripts/updateGpuReviews.js --limit="${LIMIT}" 2>&1 | tee gpu-review-update.log

      - name: Upload review update log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-review-update-${{ github.run_number }}
          path: gpu-review-update.log
          if-no-files-found: warn
          retention-days: 14
