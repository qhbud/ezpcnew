name: Component Ingest

on:
  schedule:
    # Daily at 21:00 UTC — 6 hours before the Daily Price Update (03:00 UTC), so
    # newly ingested components are in place before the nightly price run.
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      type:
        description: 'Component type to ingest, or all'
        required: false
        default: 'all'
      limit:
        description: 'Maximum candidate documents per selected component type'
        required: false
        default: '5'

concurrency:
  group: component-ingest
  cancel-in-progress: false

jobs:
  ingest-components:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (includes Puppeteer's Chromium)
        # npm ci intermittently stalls forever on Puppeteer's Chromium postinstall
        # download — burning the whole job timeout. Cap each attempt and retry on a
        # fresh tree so a transient stall fails fast instead of eating the budget.
        timeout-minutes: 25
        run: |
          for attempt in 1 2 3; do
            echo "::group::npm ci (attempt $attempt, 8-min cap)"
            if timeout 480 npm ci; then
              echo "::endgroup::"
              echo "npm ci succeeded on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::npm ci stalled/failed on attempt $attempt — cleaning node_modules and retrying"
            rm -rf node_modules
          done
          echo "::error::npm ci failed after 3 attempts"
          exit 1

      - name: Install system libraries headless Chrome needs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk-bridge2.0-0 libgbm1 libxkbcommon0 libgtk-3-0 libasound2

      - name: Run component ingest
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          DB_NAME: pcbuilder
          TYPE: ${{ github.event.inputs.type || 'all' }}
          LIMIT: ${{ github.event.inputs.limit || '5' }}
          # Residential proxy so Amazon doesn't bot-block the datacenter runner IP.
          # Add these under Settings -> Secrets and variables -> Actions. The
          # username may include a literal {session} token to rotate IP per page.
          # If unset, the scraper still runs (stealth only) but Amazon will block
          # most categories from the cloud — the proxy is what makes it reliable.
          INGEST_PROXY_SERVER: ${{ secrets.INGEST_PROXY_SERVER }}
          INGEST_PROXY_USERNAME: ${{ secrets.INGEST_PROXY_USERNAME }}
          INGEST_PROXY_PASSWORD: ${{ secrets.INGEST_PROXY_PASSWORD }}
        run: |
          if [ -z "${INGEST_PROXY_SERVER}" ]; then
            echo "::warning::INGEST_PROXY_SERVER is empty — running stealth-only. Amazon will likely block most categories from the cloud runner. Add the proxy secrets for reliable ingestion."
          fi
          if [ -z "${MONGODB_URI}" ]; then
            echo "::error::MONGODB_URI secret is empty. Add it under Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          node scripts/ingestNewComponents.js --type="${TYPE}" --limit="${LIMIT}" 2>&1 | tee component-ingest.log

      # Hide components that no longer have a current listed price (delisted /
      # no longer sold), so the catalog stays clean ahead of the price run.
      - name: Hide components with no listed price
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          DB_NAME: pcbuilder
        run: node scripts/sweepUnavailableComponents.js 2>&1 | tee -a component-ingest.log

      - name: Upload component ingest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: component-ingest-${{ github.run_number }}
          path: component-ingest.log
          if-no-files-found: warn
          retention-days: 14
