name: Component Ingest

on:
  schedule:
    # Weekly at 05:15 UTC. New component discovery is slow and Amazon can rate-limit.
    - cron: '15 5 * * 0'
  workflow_dispatch:
    inputs:
      type:
        description: 'Component type to ingest, or all'
        required: false
        default: 'all'
      limit:
        description: 'Maximum candidate documents per selected component type'
        required: false
        default: '5'

concurrency:
  group: component-ingest
  cancel-in-progress: false

jobs:
  ingest-components:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (includes Puppeteer's Chromium)
        # npm ci intermittently stalls forever on Puppeteer's Chromium postinstall
        # download — burning the whole job timeout. Cap each attempt and retry on a
        # fresh tree so a transient stall fails fast instead of eating the budget.
        timeout-minutes: 25
        run: |
          for attempt in 1 2 3; do
            echo "::group::npm ci (attempt $attempt, 8-min cap)"
            if timeout 480 npm ci; then
              echo "::endgroup::"
              echo "npm ci succeeded on attempt $attempt"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::npm ci stalled/failed on attempt $attempt — cleaning node_modules and retrying"
            rm -rf node_modules
          done
          echo "::error::npm ci failed after 3 attempts"
          exit 1

      - name: Install system libraries headless Chrome needs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk-bridge2.0-0 libgbm1 libxkbcommon0 libgtk-3-0 libasound2

      - name: Run component ingest
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          DB_NAME: pcbuilder
          TYPE: ${{ github.event.inputs.type || 'all' }}
          LIMIT: ${{ github.event.inputs.limit || '5' }}
        run: |
          if [ -z "${MONGODB_URI}" ]; then
            echo "::error::MONGODB_URI secret is empty. Add it under Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          node scripts/ingestNewComponents.js --type="${TYPE}" --limit="${LIMIT}" 2>&1 | tee component-ingest.log

      - name: Upload component ingest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: component-ingest-${{ github.run_number }}
          path: component-ingest.log
          if-no-files-found: warn
          retention-days: 14
